<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Registreer</h2>
    <form id="regForm">
        <input type="email" id="regEmail" required placeholder="Email">
        <input type="password" id="regPw" required placeholder="Password">
        <input type="submit">
    </form>
    <h2>Log in</h2>
    <form id="logForm">
        <input type="email" id="logEmail" required placeholder="Email">
        <input type="password" id="logPw" required placeholder="Password">
        <input type="submit">
    </form>

    <script src="registreer.js" type="module"></script>
</body>

</html>
