<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <title>Escape room reservaties</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container" style="background-color: white; min-height: 100vh;">
        <h2>Escape room reservaties</h2>

        <!-- Auth Section -->
        <div id="auth-section" class="d-flex justify-content-center mt-3">
            <div class="card p-3 w-50">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div>
                        <strong id="user-info">Not signed in</strong>
                    </div>
                    <div>
                        <button id="btn-logout" class="btn btn-sm btn-outline-secondary"
                            style="display:none">Logout</button>
                    </div>
                </div>

                <div id="auth-forms" class="d-flex gap-2">
                    <input id="auth-email" type="email" class="form-control" placeholder="Email">
                    <input id="auth-password" type="password" class="form-control" placeholder="Password">
                    <button id="btn-signup" class="btn btn-primary">Sign Up</button>
                    <button id="btn-login" class="btn btn-success">Log In</button>
                </div>
            </div>
        </div>
        <div class="row d-flex justify-content-center" id="main-app">
            <form id="form" class="d-flex flex-column w-25 mt-5 gap-2">
                <input type="text" id="inputNaam" placeholder="Naam escape room">
                <input type="number" id="inputMoeilijkheid" min="0" max="10" placeholder="Moeilijkheidsgraad">
                <input type="number" id="inputTijd" placeholder="Duur">
                <input type="number" id="inputAantal" placeholder="aantal spelers">
                <input type="number" id="inputPrijs" placeholder="Prijs">
                <textarea id="textBeschrijving" placeholder="korte beschrijving"></textarea>
                <input type="text" id="inputImg" placeholder="afbeelding">
                <input type="submit">
            </form>
        </div>
        <div class="row" id="divEl">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
    <script src="script.js" type="module"></script>
</body>

</html>
