<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <title>Dierenasiel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container" id="achtergrond">
        <!-- Titel -->
        <div class="d-flex justify-content-center">
            <h1>Dierenasiel</h1>
        </div>
        <!-- Form -->
        <form id="form" class="d-flex flex-column p-2">
            <!-- Naam -->
            <label>Naam:</label>
            <input type="text" id="inputNaam" placeholder="Naam" required>
            <!-- Select Diersoort -->
            <label>Diersoort:</label>
            <select name="" id="selectDiersoort">
                <option value="Hond">Hond</option>
                <option value="Kat">Kat</option>
                <option value="Konijn">Konijn</option>
                <option value="Vogel">Vogel</option>
            </select>
            <!-- Leeftijd -->
            <label>Leeftijd:</label>
            <input type="number" id="inputLeeftijd" required>
            <!-- Karakter -->
            <label>Karakter:</label>
            <input type="text" id="inputKarakter" placeholder="Karakter" required>
            <!-- Gevaccineerd -->
            <div class="ms-2 mb-3">
                <input type="checkbox" id="checkVac">
                <label>Gevaccineerd</label>
            </div>  
            <!-- Submit -->
            <input type="submit" class="btn btn-primary">
            <br>
        </form>
        <!-- container voor kaarten -->
        <div class="row d-flex justify-content-center" id="divEl">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
