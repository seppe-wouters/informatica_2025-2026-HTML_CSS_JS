<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <title>Evenementen</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container achtergrond shadow-sm">
        <h1>Evenementen</h1>
        <form id="form" class="d-flex flex-column border p-2 mb-3 rounded shadow-sm bg-white">
            <label>Naam: </label>
            <input type="text" id="inputNaam" required>
            <label>Locatie: </label>
            <input type="text" id="inputLocatie" required>
            <label>Datum:</label>
            <input type="date" id="inputDatum" required>
            <label>Type: </label>
            <select id="selectType">
                <option value="Concert">Concert</option>
                <option value="Festival">Festival</option>
                <option value="Sport">Sport</option>
                <option value="Theater">Theater</option>
            </select>
            <div>
                <input type="checkbox" id="checkBinnen" class="align-self-start ms-2 mt-2">
                <label>Binnen</label>
            </div>
            <input type="submit" class="w-25 align-self-center mt-2 mb-2">
        </form>
        <div class="row d-flex justify-content-center" id="divEl">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
