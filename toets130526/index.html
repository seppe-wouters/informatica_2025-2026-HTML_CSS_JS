<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <title>Sign in/Log in</title>
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <div class="container achtergrond">
        <div class="d-flex justify-content-center">
            <h1>Producten App Login/Sign Up</h1>
        </div>
        <!-- Register/sign in form -->
        <h2>Sign Up</h2>
        <div class="row">
            <form id="regForm" class="d-flex flex-column">
                <label class="fw-bold">Email:</label>
                <input type="email" id="regEmail" required placeholder="Email">
                <label class="fw-bold">Password:</label>
                <input type="password" id="regPw" required placeholder="Password">
                <input type="submit" class="btn btn-primary mt-2 mb-5">
            </form>
        </div>
        <!-- Login form -->
        <h2>Log in</h2>
        <div class="row">
            <form id="logForm" class="d-flex flex-column">
                <label class="fw-bold">Email:</label>
                <input type="email" id="logEmail" required placeholder="Email">
                <label class="fw-bold">Password:</label>
                <input type="password" id="logPw" required placeholder="Password">
                <input type="submit" class="btn btn-primary mt-2 mb-5">
            </form>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
    <script src="./js/login.js" type="module"></script>
</body>

</html>
