<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <title>Producten</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container achtergrond">
        <!-- header met titel en email van de ingelogde persoon -->
        <div class="d-flex justify-content-between" >
            <h2>Producten</h2>
            <p class="pt-3 me-3" id="user"></p>
        </div>
        <!-- uitlog knop -->
        <button class="btn btn-primary" id="btnLogOut">Log Out</button>
        <!-- form voor het aanmaken van een nieuw product -->
        <form id="productForm" class="mt-4 d-flex flex-column">
            <label class="fw-bold">Product Naam: </label>
            <input type="text" id="inputNaam" required>
            <label class="fw-bold" >Product Prijs: </label>
            <input type="number" id="inputPrijs" required>
            <label class="fw-bold" >Product Categorie: </label>
            <select id="selectCategorie">
                <option value="Tech">Tech</option>
                <option value="Voedsel">Voedsel</option>
                <option value="Sport">Sport</option>
            </select>
            <br>
            <input type="submit" class="btn btn-primary">
        </form>
        <!-- Plaats om alle producten te tonen -->
        <div class="row mt-5 d-flex justify-content-center" id="divEl">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
    <script src="./js/producten.js" type="module"></script>
</body>

</html>
